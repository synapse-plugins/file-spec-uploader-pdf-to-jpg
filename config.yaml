name: PDF 전처리 임포트 플러그인
code: pdf-to-image-uploader
version: 2.1.0
category: upload
description: PDF 파일의 각 페이지를 이미지로 추출하여 업로드하는 플러그인
supported_data_types:
  - image
actions:
  upload:
    entrypoint: plugin.upload.UploadAction
    method: job
    supported_data_type: image
    ui_schema:
    - $formkit: select
      name: output_format
      label: 출력 이미지 형식
      help: 추출할 이미지의 파일 형식을 선택하세요.
      options:
      - label: PNG
        value: png
      - label: JPG
        value: jpg
      value: png
      required: false
    - $formkit: number
      name: dpi
      label: 해상도 (DPI)
      help: 페이지 렌더링 해상도를 지정하세요. 기본값은 200 DPI입니다.
      value: 200
      min: 72
      max: 600
      required: false
    - $formkit: text
      name: group_name
      label: 묶음 이름
      help: 데이터 유닛에 할당할 묶음 이름을 입력하세요.
      required: false
  download:
    entrypoint: .venv.lib.python3.12.site-packages.synapse_sdk.plugins.testing.sample_actions.DownloadAction
    method: job
  convert:
    entrypoint: .venv.lib.python3.12.site-packages.synapse_sdk.plugins.testing.sample_actions.ConvertAction
    method: job
  train:
    entrypoint: .venv.lib.python3.12.site-packages.synapse_sdk.plugins.testing.sample_actions.TrainAction
    method: job
  add_task_data:
    entrypoint: .venv.lib.python3.12.site-packages.synapse_sdk.plugins.actions.add_task_data.action.AddTaskDataAction
    method: job
  export:
    entrypoint: .venv.lib.python3.12.site-packages.synapse_sdk.plugins.actions.export.action.DefaultExportAction
    method: job
